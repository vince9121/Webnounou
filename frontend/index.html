<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Suivi des Heures et KM</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <h2>Enregistrer les heures et KM</h2>
    <label>Date:</label>
    <input type="date" id="date">
    <label>Heures travaillées:</label>
    <input type="number" id="heures" placeholder="Nombre d'heures">
    <label>KM parcourus:</label>
    <input type="number" id="km" placeholder="Kilomètres">
    <button onclick="ajouterEntree()">Ajouter</button>
    
    <table>
        <thead>
            <tr>
                <th>Date</th>
                <th>Heures</th>
                <th>KM</th>
            </tr>
        </thead>
        <tbody id="table-body"></tbody>
    </table>
    
    <button onclick="resetData()">Réinitialiser</button>
    
    <script src="script.js"></script>
</body>
</html>
